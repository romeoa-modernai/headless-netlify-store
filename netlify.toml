[build]
  command = "npm run build"
  publish = "dist/client"
  functions = "dist/server"

[build.environment]
  NODE_VERSION = "24"

[dev]
  command = "npm run dev"

# Disable account routes - Customer Account API not configured
[[redirects]]
  from = "/account/*"
  to = "/"
  status = 302

[[headers]]
for = "/assets/*"
[headers.values]
"Cache-Control" = "public, max-age=31560000, immutable"

[template.environment]
PUBLIC_STORE_DOMAIN = "Store domain - set this to 'mock.shop' to try the demo site"
SESSION_SECRET = "Session secret - set this to a random value for production"
